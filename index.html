<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AREFIM - Système de Gestion Centralisé</title>
    
    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome pour les icônes -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --arefim-navy: #0f172a;
            --arefim-blue: #2563eb;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
        }

        .sidebar-item.active {
            background-color: rgba(37, 99, 235, 0.1);
            color: #2563eb;
            border-right: 4px solid #2563eb;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        /* Animation de chargement */
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Style mobile */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                position: fixed;
                z-index: 100;
            }
            .sidebar.open {
                transform: translateX(0);
            }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- BARRE LATÉRALE (SIDEBAR) -->
    <aside id="sidebar" class="sidebar w-72 bg-white border-r border-slate-200 flex flex-col transition-transform duration-300">
        <div class="p-6 border-b border-slate-100">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-hand-holding-heart text-xl"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-900">AREFIM</h1>
                    <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Goma, RD Congo</p>
                </div>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto py-4">
            <div class="px-4 mb-2 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Menu Principal</div>
            <a href="#" onclick="showSection('dashboard')" class="sidebar-item active flex items-center px-6 py-3.5 text-sm font-medium transition-all" data-section="dashboard">
                <i class="fas fa-chart-pie w-5 mr-3"></i> Tableau de bord
            </a>
            <a href="#" onclick="showSection('projects')" class="sidebar-item flex items-center px-6 py-3.5 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-all" data-section="projects">
                <i class="fas fa-folder-tree w-5 mr-3"></i> Gestion des Projets
            </a>
            <a href="#" onclick="showSection('beneficiaries')" class="sidebar-item flex items-center px-6 py-3.5 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-all" data-section="beneficiaries">
                <i class="fas fa-users-rectangle w-5 mr-3"></i> Bénéficiaires (CRM)
            </a>
            
            <div class="px-4 mt-6 mb-2 text-[11px] font-bold text-slate-400 uppercase tracking-wider">Administration</div>
            <a href="#" id="nav-hr" onclick="showSection('hr')" class="sidebar-item flex items-center px-6 py-3.5 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-all" data-section="hr">
                <i class="fas fa-user-tie w-5 mr-3"></i> Personnel (RH)
            </a>
            <a href="#" id="nav-finance" onclick="showSection('finance')" class="sidebar-item flex items-center px-6 py-3.5 text-sm font-medium text-slate-600 hover:bg-slate-50 transition-all" data-section="finance">
                <i class="fas fa-file-invoice-dollar w-5 mr-3"></i> Finance & Logistique
            </a>
        </nav>

        <div class="p-4 border-t border-slate-100 bg-slate-50/50">
            <div class="flex items-center p-3 bg-white rounded-xl border border-slate-200 shadow-sm">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">A</div>
                <div class="ml-3 overflow-hidden">
                    <p id="user-name" class="text-sm font-bold text-slate-800 truncate">Chargement...</p>
                    <p id="user-role-label" class="text-[10px] text-slate-500 font-medium uppercase">Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- ZONE DE CONTENU PRINCIPAL -->
    <main class="flex-1 flex flex-col min-w-0 bg-slate-50 overflow-hidden">
        
        <!-- Header -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 z-10">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="md:hidden mr-4 p-2 text-slate-600">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 id="page-title" class="text-lg font-bold text-slate-800">Tableau de Bord</h2>
            </div>

            <div class="flex items-center space-x-4">
                <div class="flex items-center bg-slate-100 rounded-full px-3 py-1 border border-slate-200">
                    <label class="text-[10px] font-bold text-slate-500 mr-2 uppercase">Rôle :</label>
                    <select onchange="switchRole(this.value)" class="bg-transparent border-none text-xs font-bold text-blue-600 focus:ring-0 cursor-pointer">
                        <option value="admin">Super-Admin</option>
                        <option value="pm">Chargé de Projet</option>
                        <option value="agent">Agent de Terrain</option>
                    </select>
                </div>
                <button class="relative p-2 text-slate-400 hover:text-blue-600 transition">
                    <i class="fas fa-bell"></i>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                </button>
            </div>
        </header>

        <!-- Contenu Dynamique -->
        <div id="main-content" class="flex-1 overflow-y-auto p-6 md:p-8">
            <!-- Injecté par JavaScript -->
        </div>
    </main>

    <!-- LOGIQUE JAVASCRIPT -->
    <script>
        // 1. DONNÉES DE DÉMARRAGE (MOCK DATA)
        const AREFIM_DATA = {
            projects: [
                { 
                    id: 1, 
                    name: "Formation pro pour femmes déplacées", 
                    location: "Goma (Majengo)", 
                    status: "En cours", 
                    donor: "UNHCR", 
                    budget: 25000, 
                    spent: 12400,
                    activities: 12
                },
                { 
                    id: 2, 
                    name: "Réinsertion sociale des jeunes", 
                    location: "Masisi", 
                    status: "Planifié", 
                    donor: "USAID", 
                    budget: 18000, 
                    spent: 0,
                    activities: 0
                }
            ],
            beneficiaries: [
                { id: 1, name: "Sifa Maombi", age: 28, gender: "Femme", vulnerability: "Handicap moteur", address: "Majengo, Goma", status: "Actif" },
                { id: 2, name: "Jean-Pierre Bakongo", age: 45, gender: "Homme", vulnerability: "Déplacé (Camp Mudja)", address: "Mudja, Goma", status: "En attente" }
            ],
            staff: [
                { id: 1, name: "Div", role: "Coordinatrice Technique", zone: "Goma / Hub", email: "div@arefim.org", type: "CDI" },
                { id: 2, name: "Kasongo", role: "Agent Terrain", zone: "Goma Centre", email: "kasongo@arefim.org", type: "CDD" },
                { id: 3, name: "Divine", role: "Agent Terrain", zone: "Masisi Village", email: "divine@arefim.org", type: "CDD" }
            ],
            finances: [
                { id: 101, label: "Achat kits de couture", amount: 4500, cat: "Équipement", date: "2023-10-12" },
                { id: 102, label: "Location bureau Goma", amount: 800, cat: "Logistique", date: "2023-11-01" }
            ]
        };

        // 2. ÉTAT GLOBAL
        let currentUser = { name: "Coordination AREFIM", role: "admin" };
        const contentDiv = document.getElementById('main-content');
        const titleDiv = document.getElementById('page-title');

        // 3. FONCTIONS DE RENDU
        
        function showSection(sectionId) {
            // Update Navigation UI
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-section="${sectionId}"]`).classList.add('active');

            // Security check
            if (currentUser.role === 'agent' && (sectionId === 'finance' || sectionId === 'hr')) {
                contentDiv.innerHTML = `<div class="flex flex-col items-center justify-center h-full text-slate-400">
                    <i class="fas fa-lock text-6xl mb-4"></i>
                    <p class="text-xl font-bold">Accès Restreint</p>
                    <p>Veuillez contacter l'administrateur pour accéder aux finances et RH.</p>
                </div>`;
                return;
            }

            switch(sectionId) {
                case 'dashboard': renderDashboard(); break;
                case 'projects': renderProjects(); break;
                case 'beneficiaries': renderBeneficiaries(); break;
                case 'hr': renderHR(); break;
                case 'finance': renderFinance(); break;
            }
        }

        function renderDashboard() {
            titleDiv.innerText = "Tableau de Bord";
            contentDiv.innerHTML = `
                <div class="fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-xs font-bold uppercase mb-1">Projets Actifs</p>
                            <h3 class="text-3xl font-bold text-slate-900">${AREFIM_DATA.projects.length}</h3>
                            <div class="mt-2 text-blue-600 text-xs font-bold"><i class="fas fa-arrow-up"></i> +1 ce mois</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-xs font-bold uppercase mb-1">Bénéficiaires</p>
                            <h3 class="text-3xl font-bold text-slate-900">${AREFIM_DATA.beneficiaries.length}</h3>
                            <div class="mt-2 text-green-600 text-xs font-bold"><i class="fas fa-check"></i> Données validées</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-xs font-bold uppercase mb-1">Budget Engagé</p>
                            <h3 class="text-3xl font-bold text-slate-900">43,000 $</h3>
                            <div class="mt-2 text-slate-400 text-xs">Total annuel estimé</div>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <p class="text-slate-500 text-xs font-bold uppercase mb-1">Alertes Rapports</p>
                            <h3 class="text-3xl font-bold text-red-500 italic">02</h3>
                            <div class="mt-2 text-red-400 text-xs font-bold underline cursor-pointer">Voir les échéances</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-100 p-6 shadow-sm">
                            <h4 class="font-bold text-slate-800 mb-4 tracking-tight">Activités Récentes</h4>
                            <div class="space-y-4">
                                <div class="flex items-center p-3 hover:bg-slate-50 rounded-xl transition">
                                    <div class="w-10 h-10 rounded-full bg-blue-50 text-blue-600 flex items-center justify-center mr-4"><i class="fas fa-plus"></i></div>
                                    <div>
                                        <p class="text-sm font-bold text-slate-800 underline">Nouveau bénéficiaire : Jean-Pierre Bakongo</p>
                                        <p class="text-xs text-slate-500">Ajouté par Kasongo à Mudja, Goma.</p>
                                    </div>
                                    <span class="ml-auto text-[10px] font-bold text-slate-400 italic">Il y a 2h</span>
                                </div>
                                <div class="flex items-center p-3 hover:bg-slate-50 rounded-xl transition">
                                    <div class="w-10 h-10 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center mr-4"><i class="fas fa-file-invoice"></i></div>
                                    <div>
                                        <p class="text-sm font-bold text-slate-800 underline">Dépense validée : Kits de couture</p>
                                        <p class="text-xs text-slate-500">Projet Goma / UNHCR</p>
                                    </div>
                                    <span class="ml-auto text-[10px] font-bold text-slate-400 italic">Hier</span>
                                </div>
                            </div>
                        </div>
                        <div class="bg-blue-600 rounded-2xl p-6 text-white shadow-xl shadow-blue-200">
                            <h4 class="font-bold mb-2">Note du Coordinateur</h4>
                            <p class="text-blue-100 text-sm leading-relaxed mb-6">"Priorité absolue à la collecte des données de vulnérabilité pour le rapport trimestriel UNHCR. Div, supervise la validation."</p>
                            <button class="w-full py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-xl text-xs font-bold transition">Publier une note</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderProjects() {
            titleDiv.innerText = "Gestion des Projets (GCP)";
            contentDiv.innerHTML = `
                <div class="fade-in">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-sm font-bold text-slate-500 uppercase">Liste des Interventions</h3>
                        <button class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:shadow-lg transition">+ Nouveau Projet</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        ${AREFIM_DATA.projects.map(p => `
                            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                <div class="flex justify-between mb-4">
                                    <span class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold uppercase tracking-widest">${p.donor}</span>
                                    <span class="text-xs font-bold ${p.status === 'En cours' ? 'text-green-500' : 'text-slate-400'} italic underline">${p.status}</span>
                                </div>
                                <h4 class="text-lg font-bold text-slate-800 mb-1">${p.name}</h4>
                                <p class="text-xs text-slate-500 mb-6 flex items-center"><i class="fas fa-map-marker-alt mr-2 text-red-400"></i>${p.location}</p>
                                
                                <div class="mb-4">
                                    <div class="flex justify-between text-[10px] font-bold mb-1 uppercase">
                                        <span class="text-slate-400">Consommation Budget</span>
                                        <span class="text-slate-800">${Math.round((p.spent/p.budget)*100)}%</span>
                                    </div>
                                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                                        <div class="bg-blue-600 h-full" style="width: ${(p.spent/p.budget)*100}%"></div>
                                    </div>
                                </div>
                                <div class="flex border-t pt-4 space-x-4">
                                    <button class="flex-1 text-xs font-bold text-slate-600 hover:text-blue-600 transition">CADRE LOGIQUE</button>
                                    <button class="flex-1 text-xs font-bold text-slate-600 hover:text-blue-600 transition">RAPPORTS (12)</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function renderBeneficiaries() {
            titleDiv.innerText = "Base de Données Bénéficiaires (CRM)";
            contentDiv.innerHTML = `
                <div class="fade-in bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                    <div class="p-6 border-b border-slate-50 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div class="relative flex-1 max-w-md">
                            <i class="fas fa-search absolute left-3 top-3 text-slate-400"></i>
                            <input type="text" placeholder="Rechercher un bénéficiaire..." class="w-full pl-10 pr-4 py-2 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-600 outline-none">
                        </div>
                        <div class="flex gap-2">
                            <button class="px-4 py-2 bg-white border border-slate-200 rounded-xl text-xs font-bold text-slate-600 hover:bg-slate-50 transition">Exporter PDF</button>
                            <button class="px-4 py-2 bg-blue-600 text-white rounded-xl text-xs font-bold hover:shadow-lg transition">+ Ajouter</button>
                        </div>
                    </div>
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50/50 text-slate-400 font-bold uppercase text-[10px]">
                            <tr>
                                <th class="px-6 py-4">Nom complet</th>
                                <th class="px-6 py-4">Sexe/Âge</th>
                                <th class="px-6 py-4">Type de vulnérabilité</th>
                                <th class="px-6 py-4">Localisation</th>
                                <th class="px-6 py-4">Statut</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 italic">
                            ${AREFIM_DATA.beneficiaries.map(b => `
                                <tr class="hover:bg-slate-50/50 transition cursor-pointer">
                                    <td class="px-6 py-4 font-bold text-slate-800">${b.name}</td>
                                    <td class="px-6 py-4">${b.gender} (${b.age} ans)</td>
                                    <td class="px-6 py-4"><span class="bg-red-50 text-red-600 px-2 py-1 rounded text-[10px] font-bold uppercase tracking-tight">${b.vulnerability}</span></td>
                                    <td class="px-6 py-4 text-slate-500">${b.address}</td>
                                    <td class="px-6 py-4"><span class="flex items-center"><span class="w-2 h-2 rounded-full ${b.status === 'Actif' ? 'bg-green-500' : 'bg-amber-400'} mr-2"></span>${b.status}</span></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderHR() {
            titleDiv.innerText = "Ressources Humaines (RH)";
            contentDiv.innerHTML = `
                <div class="fade-in grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${AREFIM_DATA.staff.map(s => `
                        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center">
                            <div class="w-20 h-20 rounded-2xl bg-slate-100 flex items-center justify-center text-2xl font-bold text-slate-400 mb-4">${s.name[0]}</div>
                            <h4 class="text-lg font-bold text-slate-800">${s.name}</h4>
                            <p class="text-blue-600 text-xs font-bold uppercase tracking-wider mb-4">${s.role}</p>
                            <div class="w-full text-xs text-slate-500 space-y-2 border-t pt-4">
                                <div class="flex justify-between"><span>Affectation :</span> <span class="text-slate-800 font-bold">${s.zone}</span></div>
                                <div class="flex justify-between"><span>Contrat :</span> <span class="text-slate-800 font-bold">${s.type}</span></div>
                                <div class="flex justify-between"><span>Email :</span> <span class="text-blue-500 italic underline">${s.email}</span></div>
                            </div>
                            <button class="mt-6 w-full py-2 bg-slate-50 hover:bg-slate-100 text-slate-600 text-[10px] font-bold rounded-lg transition uppercase">Voir dossier complet</button>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function renderFinance() {
            titleDiv.innerText = "Finance & Logistique";
            contentDiv.innerHTML = `
                <div class="fade-in grid grid-cols-1 lg:grid-cols-3 gap-8 text-sm">
                    <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                        <div class="p-6 border-b font-bold text-slate-800 flex justify-between items-center uppercase text-xs tracking-widest">
                            Registre des Dépenses
                            <button class="text-blue-600">+ Ajouter une pièce</button>
                        </div>
                        <div class="divide-y divide-slate-100 italic">
                            ${AREFIM_DATA.finances.map(f => `
                                <div class="p-6 flex justify-between items-center hover:bg-slate-50 transition">
                                    <div class="flex items-center">
                                        <div class="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center mr-4 text-slate-400"><i class="fas fa-file-invoice"></i></div>
                                        <div>
                                            <p class="font-bold text-slate-800 underline">${f.label}</p>
                                            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-tighter">${f.date} | ${f.cat}</p>
                                        </div>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-red-500 font-bold">-${f.amount} $</p>
                                        <p class="text-[10px] text-green-500 font-bold italic">Validé par Coord.</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="bg-slate-900 rounded-2xl p-6 shadow-xl">
                        <h4 class="text-white font-bold mb-6 flex items-center uppercase text-xs tracking-widest italic border-b border-white/10 pb-4">
                            <i class="fas fa-truck mr-3 text-blue-500"></i> Inventaire Logistique
                        </h4>
                        <div class="space-y-6">
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-white text-xs font-bold">Toyota Land Cruiser (Goma)</p>
                                    <p class="text-[10px] text-slate-500 italic uppercase">ID: AREFIM-VEH-01</p>
                                </div>
                                <span class="bg-green-500/20 text-green-400 text-[9px] font-bold px-2 py-1 rounded-full uppercase italic">Ok</span>
                            </div>
                            <div class="flex justify-between items-start">
                                <div>
                                    <p class="text-white text-xs font-bold">Générateur 5KVA (Masisi)</p>
                                    <p class="text-[10px] text-slate-500 italic uppercase">ID: AREFIM-GEN-02</p>
                                </div>
                                <span class="bg-red-500/20 text-red-400 text-[9px] font-bold px-2 py-1 rounded-full uppercase italic">En panne</span>
                            </div>
                        </div>
                        <button class="mt-8 w-full py-3 bg-white/5 hover:bg-white/10 text-white text-[10px] font-bold rounded-xl border border-white/10 transition uppercase tracking-widest">Journal des mouvements</button>
                    </div>
                </div>
            `;
        }

        // 4. SYSTÈME DE RÔLES ET UTILS
        
        function switchRole(role) {
            currentUser.role = role;
            if (role === 'admin') currentUser.name = "Coordination AREFIM";
            if (role === 'pm') currentUser.name = "Chargé de Projet Goma";
            if (role === 'agent') currentUser.name = "Kasongo (Terrain)";
            
            updateHeader();
            showSection('dashboard');
        }

        function updateHeader() {
            document.getElementById('user-name').innerText = currentUser.name;
            document.getElementById('user-role-label').innerText = currentUser.role === 'admin' ? 'Super-Admin' : (currentUser.role === 'pm' ? 'Chargé Projet' : 'Agent Terrain');
            document.getElementById('user-avatar').innerText = currentUser.name.charAt(0);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // DÉMARRAGE SÉCURISÉ
        window.addEventListener('DOMContentLoaded', () => {
            updateHeader();
            showSection('dashboard');
        });

    </script>
</body>
</html>
